services:
  ctfd:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - UPLOAD_FOLDER=/var/uploads
      - DATABASE_URL=mysql+pymysql://ctfd:ctfd@db/ctfd
      - REDIS_URL=redis://cache:6379
      - WORKERS=1
      - LOG_FOLDER=/var/log/CTFd
      - ACCESS_LOG=-
      - ERROR_LOG=-
      - REVERSE_PROXY=true
    volumes:
      - ctfd-logs:/var/log/CTFd
      - ctfd-uploads:/var/uploads
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    networks:
        default:
        internal:

  # One-time init container: sets up admin, imports challenges, configures theme
  init:
    build: .
    entrypoint: ["python3", "/opt/CTFd/scripts/docker-init.py"]
    environment:
      - CTFD_URL=http://ctfd:8000
    volumes:
      - ${CHALLENGE_REPO:-./challenges}:/challenges:ro
    depends_on:
      ctfd:
        condition: service_healthy
    restart: "no"
    networks:
        default:
        internal:

  nginx:
    image: nginx:stable
    restart: always
    volumes:
      - ./conf/nginx/http.conf:/etc/nginx/nginx.conf
    ports:
      - 80:80
    depends_on:
      - ctfd

  db:
    image: mariadb:10.11
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=ctfd
      - MARIADB_USER=ctfd
      - MARIADB_PASSWORD=ctfd
      - MARIADB_DATABASE=ctfd
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - db-data:/var/lib/mysql
    networks:
        internal:
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    # This command is required to set important mariadb defaults
    command: [mysqld, --character-set-server=utf8mb4, --collation-server=utf8mb4_unicode_ci, --wait_timeout=28800, --log-warnings=0]

  cache:
    image: redis:4
    restart: always
    volumes:
      - redis-data:/data
    networks:
        internal:

volumes:
  ctfd-logs:
  ctfd-uploads:
  db-data:
  redis-data:

networks:
    default:
    internal:
        internal: true
